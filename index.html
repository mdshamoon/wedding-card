<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1" />
    <meta name="theme-color" content="#e6d6b3" />
    <meta name="description" content="Mohd Shamoon & Alina Fatima — Wedding Invitation" />
    <title>Mohd Shamoon &amp; Alina Fatima · Wedding</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Great+Vibes&family=Amiri:wght@400;700&family=Cinzel:wght@400;500;600&family=Noto+Nastaliq+Urdu:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <script>
      // Apply the saved theme before first paint to avoid a flash.
      try {
        var t = localStorage.getItem("wc-theme");
        if (t === "emerald") {
          document.documentElement.dataset.theme = "emerald";
          var m = document.querySelector('meta[name="theme-color"]');
          if (m) m.setAttribute("content", "#0f3d2e");
        }
      } catch (e) {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
